<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atölye Paylaş — Ekipmanlar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F2EC; --surface: #FFFEFB; --ink: #1A1916; --ink-2: #6B6860; --ink-3: #A8A59F;
    --accent: #2D5A3D; --accent-light: #EAF3DE; --accent-hover: #224830;
    --danger: #C04828; --danger-light: #FAECE7;
    --border: rgba(26,25,22,0.12); --sidebar-w: 240px;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }
  body { font-family: var(--font-body); background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; }

  .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
  .sidebar-brand { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
  .brand-logo { font-family: var(--font-display); font-size: 16px; color: var(--accent); display: flex; align-items: center; gap: 8px; text-decoration: none; margin-bottom: 14px; }
  .sidebar-profil { background: var(--accent-light); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
  .profil-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .profil-isim { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .profil-rol { font-size: 11px; color: var(--accent); margin-top: 1px; }
  .sidebar-menu { flex: 1; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; }
  .menu-label { font-size: 10px; font-weight: 500; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 10px 4px; }
  .menu-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; font-size: 13px; color: var(--ink-2); text-decoration: none; cursor: pointer; transition: all 0.12s; border: none; background: none; width: 100%; font-family: var(--font-body); text-align: left; }
  .menu-item:hover { background: var(--bg); color: var(--ink); }
  .menu-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .menu-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.6; }
  .menu-item.active svg { opacity: 1; }
  .menu-item.danger { color: var(--danger); }
  .menu-item.danger:hover { background: var(--danger-light); }
  .sidebar-footer { padding: 10px 8px; border-top: 1px solid var(--border); }

  .main { margin-left: var(--sidebar-w); flex: 1; padding: 36px 40px; }
  .page-header { margin-bottom: 24px; }
  .page-header h1 { font-family: var(--font-display); font-size: 28px; font-weight: 400; margin-bottom: 4px; }
  .page-header p { font-size: 13px; color: var(--ink-2); font-weight: 300; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .filter-btn { padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface); font-family: var(--font-body); font-size: 13px; color: var(--ink-2); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

  /* GRID */
  .ekipman-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }

  .kart { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
  .kart:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.1); }

  /* GÖRSEL */
  .kart-gorsel { height: 160px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .kart-gorsel img { width: 100%; height: 100%; object-fit: cover; }
  .kart-gorsel-icon { font-size: 44px; opacity: 0.4; }
  .kart-kategori-badge { position: absolute; top: 10px; left: 10px; background: var(--surface); border-radius: 6px; padding: 3px 9px; font-size: 11px; font-weight: 500; color: var(--accent); border: 1px solid var(--border); }

  /* SAĞLIK KARNESİ BADGE */
  .kart-saglik-badge {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(255,255,255,0.92);
    border-radius: 6px;
    padding: 4px 8px;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
  }

  .saglik-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .saglik-dot.iyi { background: var(--accent); }
  .saglik-dot.orta { background: #F59E0B; }
  .saglik-dot.kotu { background: var(--danger); }

  .kart-body { padding: 16px; }
  .kart-baslik { font-family: var(--font-display); font-size: 17px; font-weight: 400; color: var(--ink); margin-bottom: 4px; }
  .kart-aciklama { font-size: 12px; color: var(--ink-2); font-weight: 300; line-height: 1.6; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 38px; }

  /* SAĞLIK ÇUBUĞU */
  .saglik-wrap { margin-bottom: 12px; }
  .saglik-ust { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .saglik-ust-label { font-size: 11px; color: var(--ink-3); }
  .saglik-ust-yuzde { font-size: 11px; font-weight: 500; }
  .saglik-ust-yuzde.iyi { color: var(--accent); }
  .saglik-ust-yuzde.orta { color: #F59E0B; }
  .saglik-ust-yuzde.kotu { color: var(--danger); }
  .saglik-bar-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .saglik-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .saglik-bar.iyi { background: var(--accent); }
  .saglik-bar.orta { background: #F59E0B; }
  .saglik-bar.kotu { background: var(--danger); }
  .saglik-yorum { font-size: 11px; color: var(--ink-3); margin-top: 4px; font-style: italic; }

  .kart-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); }
  .kart-ucret-fiyat { font-size: 18px; font-weight: 500; color: var(--accent); }
  .kart-ucret-birim { font-size: 11px; color: var(--ink-3); }
  .kart-sahip { font-size: 11px; color: var(--ink-3); }
  .kart-sahip span { color: var(--ink-2); font-weight: 500; }
  .kart-kirala-btn { width: 100%; margin-top: 12px; padding: 9px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .kart-kirala-btn:hover { background: var(--accent-hover); }

  .bos-durum { text-align: center; padding: 80px 20px; grid-column: 1/-1; }
  .bos-durum-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.4; }
  .bos-durum h3 { font-family: var(--font-display); font-size: 22px; font-weight: 400; margin-bottom: 6px; }
  .bos-durum p { font-size: 13px; color: var(--ink-2); font-weight: 300; }

  .skeleton { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .skeleton-img { height: 160px; background: var(--bg); }
  .skeleton-body { padding: 16px; }
  .sk-line { height: 13px; background: var(--bg); border-radius: 4px; margin-bottom: 10px; }
  .sk-line.w60 { width: 60%; } .sk-line.w40 { width: 40%; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(26,25,22,0.5); display: flex; align-items: center; justify-content: center; z-index: 300; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 460px; padding: 28px; transform: translateY(16px); transition: transform 0.2s; }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal-baslik { font-family: var(--font-display); font-size: 22px; font-weight: 400; margin-bottom: 4px; }
  .modal-sahip { font-size: 13px; color: var(--ink-2); margin-bottom: 16px; }
  .modal-ucret { font-size: 26px; font-weight: 500; color: var(--accent); margin-bottom: 18px; }
  .modal-ucret small { font-size: 13px; color: var(--ink-3); font-weight: 300; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 11px; font-weight: 500; color: var(--ink); margin-bottom: 5px; letter-spacing: 0.02em; text-transform: uppercase; }
  .modal-field input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg); font-family: var(--font-body); font-size: 13px; color: var(--ink); outline: none; transition: border-color 0.15s; }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-toplam { background: var(--accent-light); border-radius: 8px; padding: 12px 14px; margin: 14px 0; display: flex; justify-content: space-between; align-items: center; }
  .modal-toplam-label { font-size: 12px; color: var(--accent); font-weight: 500; }
  .modal-toplam-fiyat { font-size: 18px; font-weight: 500; color: var(--accent); }
  .modal-buttons { display: flex; gap: 10px; margin-top: 16px; }
  .modal-buttons button { flex: 1; padding: 10px; border-radius: 8px; font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-iptal { background: var(--bg); color: var(--ink-2); border: 1.5px solid var(--border) !important; }
  .btn-kirala { background: var(--accent); color: #fff; }
  .btn-kirala:hover { background: var(--accent-hover); }
  .alert-success { background: var(--accent-light); color: var(--accent); padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-top: 10px; display: none; }
  .alert-success.show { display: block; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <a href="ekipmanlar.html" class="brand-logo">⚙ Atölye Paylaş</a>
    <div class="sidebar-profil">
      <div class="profil-avatar" id="profil-avatar">?</div>
      <div style="min-width:0">
        <div class="profil-isim" id="profil-isim">—</div>
        <div class="profil-rol" id="profil-rol">—</div>
      </div>
    </div>
  </div>
  <nav class="sidebar-menu">
    <div class="menu-label">Genel</div>
    <a href="ekipmanlar.html" class="menu-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Ekipmanlar
    </a>
    <a href="kiralamalar.html" class="menu-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
      Kiralamalarım
    </a>
    <div class="menu-label" id="sahip-label" style="display:none">Sahip</div>
    <a href="sahip-panel.html" class="menu-item" id="sahip-menu" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Ekipman Panelim
    </a>
  </nav>
  <div class="sidebar-footer">
    <button class="menu-item danger" onclick="cikisYap()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Çıkış Yap
    </button>
  </div>
</aside>

<div class="main">
  <div class="page-header">
    <h1>Mevcut Ekipmanlar</h1>
    <p>Müsait ekipmanları kirala, atölyeni güçlendir.</p>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filtrele(this,'')">Tümü</button>
    <button class="filter-btn" onclick="filtrele(this,'Ahşap İşleme')">🪵 Ahşap İşleme</button>
    <button class="filter-btn" onclick="filtrele(this,'Metal İşleme')">⚙️ Metal İşleme</button>
    <button class="filter-btn" onclick="filtrele(this,'Elektronik')">🔌 Elektronik</button>
    <button class="filter-btn" onclick="filtrele(this,'3D Baskı')">🖨️ 3D Baskı</button>
    <button class="filter-btn" onclick="filtrele(this,'Tekstil')">🧵 Tekstil</button>
    <button class="filter-btn" onclick="filtrele(this,'Diğer')">📦 Diğer</button>
  </div>

  <div id="ekipman-listesi" class="ekipman-grid">
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="sk-line"></div><div class="sk-line w60"></div><div class="sk-line w40"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="sk-line"></div><div class="sk-line w60"></div><div class="sk-line w40"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="sk-line"></div><div class="sk-line w60"></div><div class="sk-line w40"></div></div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="modalKapat(event)">
  <div class="modal">
    <h3 class="modal-baslik" id="modal-baslik"></h3>
    <p class="modal-sahip" id="modal-sahip"></p>
    <div class="modal-ucret"><span id="modal-ucret"></span> <small>/ saat</small></div>
    <div class="modal-field"><label>Başlangıç</label><input type="datetime-local" id="baslangic" oninput="hesapla()"></div>
    <div class="modal-field"><label>Bitiş</label><input type="datetime-local" id="bitis" oninput="hesapla()"></div>
    <div class="modal-field"><label>Teslimat Noktası</label><input type="text" id="teslimat" placeholder="Adres veya buluşma noktası"></div>
    <div class="modal-toplam">
      <span class="modal-toplam-label">Toplam Tutar</span>
      <span class="modal-toplam-fiyat" id="toplam-tutar">—</span>
    </div>
    <div class="modal-buttons">
      <button class="btn-iptal" onclick="modalKapat()">İptal</button>
      <button class="btn-kirala" onclick="kiralamaGonder()">Kirala</button>
    </div>
    <div class="alert-success" id="kirala-success">✓ Kiralama isteğin gönderildi!</div>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost/atolyepaylas/api';
  const kategorIkonlar = { 'Ahşap İşleme':'🪵','Metal İşleme':'⚙️','Elektronik':'🔌','3D Baskı':'🖨️','Tekstil':'🧵','Diğer':'📦' };

  const kullanici = JSON.parse(localStorage.getItem('kullanici') || 'null');
  if (!kullanici) { window.location.href = 'giris-kayit.html'; }

  const initials = kullanici.ad_soyad.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('profil-avatar').textContent = initials;
  document.getElementById('profil-isim').textContent = kullanici.ad_soyad;
  document.getElementById('profil-rol').textContent = kullanici.rol === 'sahip' ? 'Ekipman Sahibi' : 'Kiralayan';

  if (kullanici.rol === 'sahip') {
    document.getElementById('sahip-label').style.display = 'block';
    document.getElementById('sahip-menu').style.display = 'flex';
  }

  let secilenEkipman = null;

  function saglikRenk(skor) {
    if (skor >= 75) return 'iyi';
    if (skor >= 40) return 'orta';
    return 'kotu';
  }

  function filtrele(btn, kategori) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ekipmanlariYukle(kategori);
  }

  async function ekipmanlariYukle(kategori='') {
    const liste = document.getElementById('ekipman-listesi');
    liste.innerHTML = `<div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="sk-line"></div><div class="sk-line w60"></div></div></div>`.repeat(3);
    try {
      const url = kategori ? `${API_BASE}/ekipmanlar_listele.php?kategori=${encodeURIComponent(kategori)}` : `${API_BASE}/ekipmanlar_listele.php`;
      const res = await fetch(url, { credentials:'include' });
      const data = await res.json();
      if (data.status === 'success') await renderEkipmanlar(data.ekipmanlar);
    } catch {
      liste.innerHTML = '<div class="bos-durum"><div class="bos-durum-icon">⚠️</div><h3>Bağlantı hatası</h3></div>';
    }
  }

  async function renderEkipmanlar(ekipmanlar) {
    const liste = document.getElementById('ekipman-listesi');
    if (ekipmanlar.length === 0) {
      liste.innerHTML = '<div class="bos-durum"><div class="bos-durum-icon">🔍</div><h3>Ekipman bulunamadı</h3><p>Bu kategoride müsait ekipman yok.</p></div>';
      return;
    }

    // Önce kartları göster
    liste.innerHTML = ekipmanlar.map(e => {
      const gorsel = e.fotograf
        ? `<img src="http://localhost/atolyepaylas/uploads/${e.fotograf}" alt="${e.baslik}" style="width:100%;height:100%;object-fit:cover;">`
        : `<span class="kart-gorsel-icon">${kategorIkonlar[e.kategori]||'📦'}</span>`;

      return `
        <div class="kart">
          <div class="kart-gorsel">
            ${gorsel}
            <span class="kart-kategori-badge">${e.kategori}</span>
            <div class="kart-saglik-badge" id="saglik-badge-${e.id}">
              <div class="saglik-dot iyi"></div>
              <span>—</span>
            </div>
          </div>
          <div class="kart-body">
            <h3 class="kart-baslik">${e.baslik}</h3>
            <p class="kart-aciklama">${e.aciklama||'Açıklama eklenmemiş.'}</p>
            <div class="saglik-wrap" id="saglik-${e.id}">
              <div class="saglik-ust">
                <span class="saglik-ust-label">🩺 Sağlık Karnesi</span>
                <span class="saglik-ust-yuzde iyi" id="saglik-yuzde-${e.id}">Yükleniyor...</span>
              </div>
              <div class="saglik-bar-bg">
                <div class="saglik-bar iyi" id="saglik-bar-${e.id}" style="width:0%"></div>
              </div>
              <div class="saglik-yorum" id="saglik-yorum-${e.id}"></div>
            </div>
            <div class="kart-footer">
              <div><span class="kart-ucret-fiyat">₺${parseFloat(e.saatlik_ucret).toFixed(0)}</span> <span class="kart-ucret-birim">/ saat</span></div>
              <span class="kart-sahip">Sahip: <span>${e.sahip_adi}</span></span>
            </div>
            <button class="kart-kirala-btn" onclick='modalAc(${JSON.stringify(e).replace(/'/g,"&#39;")})'>Kirala</button>
          </div>
        </div>`;
    }).join('');

    // Sağlık karnelerini arka planda çek
    for (const e of ekipmanlar) {
      try {
        const res = await fetch(`${API_BASE}/saglik_karnesi.php?ekipman_id=${e.id}`, { credentials:'include' });
        const data = await res.json();
        if (data.status === 'success') {
          const skor = data.saglik_karnesi.kondisyon_yuzdesi;
          const renk = saglikRenk(skor);
          const yorum = data.saglik_karnesi.sistem_yorumu;

          // Bar
          const bar = document.getElementById(`saglik-bar-${e.id}`);
          if (bar) { bar.style.width = skor + '%'; bar.className = `saglik-bar ${renk}`; }

          // Yüzde
          const yuzde = document.getElementById(`saglik-yuzde-${e.id}`);
          if (yuzde) { yuzde.textContent = skor + '%'; yuzde.className = `saglik-ust-yuzde ${renk}`; }

          // Yorum
          const yorumEl = document.getElementById(`saglik-yorum-${e.id}`);
          if (yorumEl) yorumEl.textContent = yorum;

          // Badge
          const badge = document.getElementById(`saglik-badge-${e.id}`);
          if (badge) {
            badge.querySelector('.saglik-dot').className = `saglik-dot ${renk}`;
            badge.querySelector('span').textContent = skor + '%';
          }
        }
      } catch {}
    }
  }

  function modalAc(e) {
    secilenEkipman = e;
    document.getElementById('modal-baslik').textContent = e.baslik;
    document.getElementById('modal-sahip').textContent = 'Sahip: ' + e.sahip_adi;
    document.getElementById('modal-ucret').textContent = '₺' + parseFloat(e.saatlik_ucret).toFixed(2);
    document.getElementById('toplam-tutar').textContent = '—';
    document.getElementById('baslangic').value = '';
    document.getElementById('bitis').value = '';
    document.getElementById('teslimat').value = '';
    document.getElementById('kirala-success').classList.remove('show');
    document.getElementById('modal-overlay').classList.add('show');
  }

  function modalKapat(e) {
    if (!e || e.target === document.getElementById('modal-overlay'))
      document.getElementById('modal-overlay').classList.remove('show');
  }

  function hesapla() {
    const b = document.getElementById('baslangic').value;
    const bt = document.getElementById('bitis').value;
    if (!b || !bt || !secilenEkipman) return;
    const saat = (new Date(bt) - new Date(b)) / 3600000;
    document.getElementById('toplam-tutar').textContent = saat <= 0 ? 'Geçersiz' : '₺' + (saat * parseFloat(secilenEkipman.saatlik_ucret)).toFixed(2);
  }

  async function kiralamaGonder() {
    const b = document.getElementById('baslangic').value;
    const bt = document.getElementById('bitis').value;
    const t = document.getElementById('teslimat').value.trim();
    if (!b || !bt || !t) { alert('Tüm alanları doldurun.'); return; }
    const saat = (new Date(bt) - new Date(b)) / 3600000;
    if (saat <= 0) { alert('Geçersiz tarih.'); return; }
    const toplam = saat * parseFloat(secilenEkipman.saatlik_ucret);
    try {
      const res = await fetch(`${API_BASE}/kirala.php`, {
        method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
        body: JSON.stringify({ ekipman_id:secilenEkipman.id, baslangic_tarihi:b.replace('T',' '), bitis_tarihi:bt.replace('T',' '), toplam_tutar:toplam.toFixed(2), teslimat_noktasi:t })
      });
      const data = await res.json();
      if (data.status==='success') { document.getElementById('kirala-success').classList.add('show'); setTimeout(()=>modalKapat(null),2500); }
      else { alert(data.message||'Hata.'); }
    } catch { alert('Bağlantı hatası.'); }
  }

 async function cikisYap() {
    await fetch('http://localhost/atolyepaylas/api/cikis.php', { method:'POST', credentials:'include' });
    localStorage.removeItem('kullanici');
    window.location.href = 'giris-kayit.html';
}

  ekipmanlariYukle();
</script>
</body>
